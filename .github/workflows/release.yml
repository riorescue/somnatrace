name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build UI (once, cached on first matrix run)
        run: npm ci && npm run build
        working-directory: web

      - name: Build binary
        env:
          GOOS:   ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VERSION="${GITHUB_REF_NAME}"
          go build \
            -ldflags "-s -w -X github.com/riorescue/somnatrace/internal/config.Version=${VERSION}" \
            -o "somnatrace-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" \
            ./cmd/somnatrace

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: somnatrace-*
          generate_release_notes: true
