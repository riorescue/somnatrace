services:
  somnatrace:
    build:
      context: .
      args:
        VERSION: dev
    image: somnatrace:dev
    ports:
      - "8080:8080"
    volumes:
      - somnatrace-data:/data
    environment:
      SOMNATRACE_MODE: production
      SOMNATRACE_DATA_DIR: /data
    restart: unless-stopped

volumes:
  somnatrace-data:
